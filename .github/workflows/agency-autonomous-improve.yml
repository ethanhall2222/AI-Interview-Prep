name: Agency Autonomous Improve

on:
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"

permissions:
  contents: write
  issues: write

jobs:
  improve:
    name: Create next improvement PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create agent-improvement --color 5319E7 --description "Autonomous agent improvement PR" || true
          gh label create output-ready --color 0E8A16 --description "Output readiness work" || true

      - name: Apply next improvement
        run: pnpm agents:improve
        env:
          AGENCY_MAX_CHANGES: "1"

      - name: Verify readiness
        run: pnpm agents:build
        env:
          NEXT_PUBLIC_DEV_MODE: "1"

      - name: Commit verified improvement
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No improvement changes to commit."
            exit 0
          fi

          git config user.name "hire-ground-agents"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Agent improvement: harden next route state"
          git push origin HEAD:main

      - name: Open status issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Agent improvement shipped"
          body="The autonomous agent loop applied and verified a product-hardening change on main. Readiness gates passed with pnpm agents:build."
          existing="$(gh issue list --state open --label agent-improvement --search "$title in:title" --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --label agent-improvement --body "$body"
          fi
